<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Restablecer Contraseña</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                background: #f4f7f5;
                font-family: Arial, sans-serif;
            }

            .container {
                max-width: 600px;
                margin: 40px auto;
                background: #fff;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            }

            .header {
                background: #16a34a;
                color: white;
                text-align: center;
                padding: 30px 20px;
            }

            .title {
                margin: 0;
                font-size: 26px;
                font-weight: bold;
            }

            .content {
                padding: 30px;
                color: #333;
            }

            .otp-box {
                text-align: center;
                background: #dcfce7;
                padding: 20px;
                border-radius: 8px;
                margin: 25px 0;
            }

            .otp-code {
                font-size: 40px;
                font-weight: bold;
                letter-spacing: 10px;
                color: #15803d;
                font-family: "Courier New", monospace;
            }

            .warning {
                color: #dc2626;
                font-size: 14px;
                margin-top: 20px;
            }

            .footer {
                text-align: center;
                padding: 15px;
                font-size: 12px;
                color: #777;
                background: #f1f5f2;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="header">
                <h1 class="title">Recuperación de Contraseña</h1>
            </div>

            <div class="content">
                <p>Hola <strong>{{USERNAME}}</strong>,</p>

                <p>Usa el siguiente código para restablecer tu contraseña:</p>

                <div class="otp-box">
                    <div class="otp-code">{{CODE}}</div>
                </div>

                <p>
                    Este código es válido por
                    <strong>{{EXPIRATION_MINUTES}}</strong>.
                </p>

                <p class="warning">
                    ⚠️ Si no solicitaste este cambio, ignora este mensaje.
                </p>
            </div>

            <div class="footer">
                © {{CURRENT_YEAR}} - Este es un correo automático, por favor no
                responder.
            </div>
        </div>
    </body>
</html>
